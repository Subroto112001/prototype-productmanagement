<!DOCTYPE html><html class="light" lang="en"><head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Create Quotation - Inventory Management</title>
        <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;600;700&amp;display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
    <link href="./css/style.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="./js/tailwind-config.js"></script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>

<body class="bg-background text-on-background font-body-base antialiased min-h-screen flex">
    <!-- SideNavBar (Shared Component) -->
    <!-- Main Content Area -->
    <div class="ml-[260px] flex-1 flex flex-col min-h-screen">
        <!-- header -->
        <div id="header-root"></div>
        <!-- Page Content -->
        <main class="flex-1 flex justify-center flex-1 flex flex-col min-h-screen bg-background"><div class="p-container-margin w-full max-w-[1600px] mx-auto flex-1 flex flex-col gap-6"><div class="w-full max-w-3xl bg-surface-container-lowest rounded-xl border border-outline-variant p-card-padding shadow-[0_1px_3px_rgba(0,0,0,0.05)]">
                <h2 class="font-title-sm text-title-sm text-on-surface mb-6 border-b border-outline-variant pb-2">Create Quotation</h2>
                <form class="flex flex-col gap-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div class="flex flex-col gap-1">
                            <label class="font-label-caps text-label-caps text-on-surface-variant uppercase">Select Client</label>
                            <select class="form-select w-full border-outline-variant rounded focus:border-primary focus:ring-2 focus:ring-primary/20 text-body-base bg-white h-10">
                                <option value="" disabled="" selected="">Choose a client...</option>
                                <option>Acme Corp Ltd.</option>
                                <option>TechFlow Industries</option>
                                <option>Global Logistics</option>
                            </select>
                        </div>
                        <div class="flex flex-col gap-1">
                            <label class="font-label-caps text-label-caps text-on-surface-variant uppercase">Date</label>
                            <input class="form-input w-full border-outline-variant rounded focus:border-primary focus:ring-2 focus:ring-primary/20 text-body-base bg-white h-10" type="date">
                        </div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-2">
                        <div class="flex flex-col gap-1">
                            <label class="font-label-caps text-label-caps text-on-surface-variant uppercase">Item Name</label>
                            <input class="form-input w-full border-outline-variant rounded focus:border-primary focus:ring-2 focus:ring-primary/20 text-body-base bg-white h-10" type="text" placeholder="Enter item name">
                        </div>
                        <div class="flex flex-col gap-1">
                            <label class="font-label-caps text-label-caps text-on-surface-variant uppercase">Quantity</label>
                            <input class="form-input w-full border-outline-variant rounded focus:border-primary focus:ring-2 focus:ring-primary/20 text-body-base bg-white h-10" type="number" placeholder="0">
                        </div>
                        <div class="flex flex-col gap-1">
                            <label class="font-label-caps text-label-caps text-on-surface-variant uppercase">Unit Price (BDT)</label>
                            <input class="form-input w-full border-outline-variant rounded focus:border-primary focus:ring-2 focus:ring-primary/20 text-body-base bg-white h-10" type="number" placeholder="0.00">
                        </div>
                        <div class="flex flex-col gap-1">
                            <label class="font-label-caps text-label-caps text-on-surface-variant uppercase">VAT %</label>
                            <select class="form-select w-full border-outline-variant rounded focus:border-primary focus:ring-2 focus:ring-primary/20 text-body-base bg-white h-10">
                                <option>0%</option>
                                <option>5%</option>
                                <option>15%</option>
                            </select>
                        </div>
                        <div class="flex flex-col gap-1 md:col-span-2">
                            <label class="font-label-caps text-label-caps text-on-surface-variant uppercase">Notes / Terms</label>
                            <textarea class="form-textarea w-full border-outline-variant rounded focus:border-primary focus:ring-2 focus:ring-primary/20 text-body-base bg-white" rows="3" placeholder="Enter any specific terms or notes..."></textarea>
                        </div>
                    </div>
                    <div class="mt-6 flex justify-end gap-3">
                        <button type="button" class="bg-white border border-secondary text-primary font-label-caps text-label-caps py-2 px-6 rounded hover:bg-surface-container-low transition-colors uppercase tracking-wider">
                            Cancel
                        </button>
                        <button type="submit" class="bg-[#0D9488] text-white font-label-caps text-label-caps py-2 px-6 rounded shadow-[0_2px_0_rgba(0,0,0,0.1)] active:shadow-none active:translate-y-[2px] hover:opacity-90 transition-all uppercase tracking-wider flex justify-center items-center gap-2">
                            <span class="material-symbols-outlined text-[18px]">add_circle</span>
                            Create Quotation
                        </button>
                    </div>
                </form>
            </div></div></main>
    </div>
    <script src="./js/sidebar.js" defer=""></script>


</body></html>
